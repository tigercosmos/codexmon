name: Release

# Publish a GitHub Release with cross-platform binaries when a version tag is
# pushed:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the release and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the changelog can be built

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true

      - name: Verify before release
        run: |
          go vet ./...
          go test -count=1 ./...

      - name: Release with GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
