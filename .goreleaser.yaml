# GoReleaser config — builds cross-platform binaries and publishes a GitHub
# Release on tag push. See .github/workflows/release.yml.
#   Local dry run:  goreleaser release --snapshot --clean
version: 2

project_name: codexmon

builds:
  - id: codexmon
    main: ./cmd/codexmon
    binary: codexmon
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/tigercosmos/codexmon/internal/cli.Version={{ .Version }}
    # codexmon is Unix-only (process groups via Setpgid/Setsid); no Windows.
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: codexmon
    name_template: "codexmon_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "SHA256SUMS"
  algorithm: sha256

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"

release:
  draft: false
  prerelease: auto
  name_template: "codexmon {{ .Tag }}"
